# HTTP → HTTPS リダイレクト
<VirtualHost *:80>
    ServerName oc-routenavi.cc.it-hiroshima.ac.jp
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# HTTPS リバースプロキシ
<VirtualHost *:443>
    ServerName oc-routenavi.cc.it-hiroshima.ac.jp
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/server.crt
    SSLCertificateKeyFile /etc/ssl/private/server.key

    # バックエンドAPI
    ProxyPass        /api/ http://app:8080/api/
    ProxyPassReverse /api/ http://app:8080/api/

    # アップロードファイル（直接バックエンドへ）
    ProxyPass        /uploads http://app:8080/uploads
    ProxyPassReverse /uploads http://app:8080/uploads

    # フロントエンド（それ以外すべて）
    ProxyPass        / http://frontend:80/
    ProxyPassReverse / http://frontend:80/

    ProxyPreserveHost On
</VirtualHost>
