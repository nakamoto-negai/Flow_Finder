services:
  apache:
    image: httpd:2.4
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apache/app.conf:/usr/local/apache2/conf/extra/app.conf
      - /etc/letsencrypt/live/oc-routenavi.cc.it-hiroshima.ac.jp/fullchain.pem:/etc/ssl/certs/server.crt:ro
      - /etc/letsencrypt/live/oc-routenavi.cc.it-hiroshima.ac.jp/privkey.pem:/etc/ssl/private/server.key:ro
      - ./flow_finder/uploads:/var/www/uploads:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped
    command: >
      sh -c "
        sed -i 's@#LoadModule socache_shmcb_module@LoadModule socache_shmcb_module@' /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule ssl_module@LoadModule ssl_module@' /usr/local/apache2/conf/httpd.conf &&
        echo 'Listen 443' >> /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule rewrite_module@LoadModule rewrite_module@' /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule proxy_module@LoadModule proxy_module@' /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule proxy_http_module@LoadModule proxy_http_module@' /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule headers_module@LoadModule headers_module@' /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule expires_module@LoadModule expires_module@' /usr/local/apache2/conf/httpd.conf &&
        sed -i 's@#LoadModule alias_module@LoadModule alias_module@' /usr/local/apache2/conf/httpd.conf &&
        echo 'Include conf/extra/app.conf' >> /usr/local/apache2/conf/httpd.conf &&
        httpd-foreground
      "
  app:
    build: .
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=postgres
      - GIN_MODE=release
      - REDIS_ADDR=redis:6379
    volumes:
      - ./flow_finder/uploads:/app/uploads
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=https://oc-routenavi.cc.it-hiroshima.ac.jp/api
    expose:
      - "80"
    depends_on:
      - app
    restart: unless-stopped
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
volumes:
  pgdata:
  redisdata:
